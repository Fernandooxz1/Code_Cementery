<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Slash: Vector Edge</title>
    <!-- Share Tech Mono is perfect for high-tech vector styling -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030305;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
        }
        canvas {
            display: block;
            background-color: #050508;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            cursor: none; /* Hide default cursor to use neon vector crosshair */
        }
        #audio-hint {
            position: absolute;
            bottom: 20px;
            color: rgba(0, 240, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="audio-hint">CLICK TO INITIALIZE COMBAT AUDIO SYSTEMS</div>

    <script>
        // --- AUDIO CONTROLLER (Web Audio API Procedural Synth) ---
        class AudioController {
            constructor() {
                this.ctx = null;
                this.masterGain = null;
                this.bgmInterval = null;
                this.bgmStep = 0;
                this.isMuted = false;
                this.initialized = false;
            }

            init() {
                if (this.initialized) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.setValueAtTime(0.25, this.ctx.currentTime);
                    this.masterGain.connect(this.ctx.destination);
                    this.initialized = true;
                    this.startBgm();
                    document.getElementById('audio-hint').style.display = 'none';
                } catch (e) {
                    console.error("Web Audio API not supported:", e);
                }
            }

            playSound(type) {
                if (!this.initialized || this.isMuted || this.ctx.state === 'suspended') return;
                const now = this.ctx.currentTime;

                switch (type) {
                    case 'jump': {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(140, now);
                        osc.frequency.exponentialRampToValueAtTime(360, now + 0.12);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.12);
                        osc.connect(gain);
                        gain.connect(this.masterGain);
                        osc.start(now);
                        osc.stop(now + 0.12);
                        break;
                    }
                    case 'slash': {
                        // Noise whoosh
                        const bufferSize = this.ctx.sampleRate * 0.12;
                        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = Math.random() * 2 - 1;
                        }
                        const noise = this.ctx.createBufferSource();
                        noise.buffer = buffer;

                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'bandpass';
                        filter.Q.setValueAtTime(4.0, now);
                        filter.frequency.setValueAtTime(1400, now);
                        filter.frequency.exponentialRampToValueAtTime(350, now + 0.12);

                        const gain = this.ctx.createGain();
                        gain.gain.setValueAtTime(0.18, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.12);

                        noise.connect(filter);
                        filter.connect(gain);
                        gain.connect(this.masterGain);
                        noise.start(now);
                        break;
                    }
                    case 'hit': {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(550, now);
                        osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);

                        gain.gain.setValueAtTime(0.22, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.08);

                        osc.connect(gain);
                        gain.connect(this.masterGain);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                    }
                    case 'deflect': {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(950, now);
                        osc.frequency.exponentialRampToValueAtTime(1400, now + 0.1);

                        gain.gain.setValueAtTime(0.25, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.1);

                        osc.connect(gain);
                        gain.connect(this.masterGain);
                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                    }
                    case 'dash': {
                        const bufferSize = this.ctx.sampleRate * 0.18;
                        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = Math.random() * 2 - 1;
                        }
                        const noise = this.ctx.createBufferSource();
                        noise.buffer = buffer;

                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(900, now);
                        filter.frequency.exponentialRampToValueAtTime(100, now + 0.18);

                        const gain = this.ctx.createGain();
                        gain.gain.setValueAtTime(0.25, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.18);

                        noise.connect(filter);
                        filter.connect(gain);
                        gain.connect(this.masterGain);
                        noise.start(now);
                        break;
                    }
                    case 'kill': {
                        const osc1 = this.ctx.createOscillator();
                        const osc2 = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();

                        osc1.type = 'sawtooth';
                        osc1.frequency.setValueAtTime(160, now);
                        osc1.frequency.linearRampToValueAtTime(30, now + 0.25);

                        osc2.type = 'triangle';
                        osc2.frequency.setValueAtTime(80, now);
                        osc2.frequency.linearRampToValueAtTime(20, now + 0.25);

                        gain.gain.setValueAtTime(0.35, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);

                        osc1.connect(gain);
                        osc2.connect(gain);
                        gain.connect(this.masterGain);

                        osc1.start(now);
                        osc2.start(now);
                        osc1.stop(now + 0.25);
                        osc2.stop(now + 0.25);
                        break;
                    }
                    case 'hurt': {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.linearRampToValueAtTime(60, now + 0.25);
                        gain.gain.setValueAtTime(0.25, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
                        osc.connect(gain);
                        gain.connect(this.masterGain);
                        osc.start(now);
                        osc.stop(now + 0.25);
                        break;
                    }
                }
            }

            startBgm() {
                if (!this.initialized || this.isMuted) return;
                this.bgmInterval = setInterval(() => {
                    if (this.isMuted || this.ctx.state === 'suspended') return;
                    this.playBgmStep();
                }, 140); // 140ms per step
            }

            playBgmStep() {
                const now = this.ctx.currentTime;
                const step = this.bgmStep % 16;

                // 4/4 Kick drum
                if (step % 4 === 0) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.frequency.setValueAtTime(110, now);
                    osc.frequency.exponentialRampToValueAtTime(35, now + 0.12);
                    gain.gain.setValueAtTime(0.18, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.12);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(now);
                    osc.stop(now + 0.12);
                }

                // Hi-hat tick
                if (step % 2 === 1) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(8000, now);
                    gain.gain.setValueAtTime(0.015, now);
                    gain.gain.linearRampToValueAtTime(0.0001, now + 0.04);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(now);
                    osc.stop(now + 0.04);
                }

                // Bassline arpeggio
                const bassSequence = [
                    55.00, 55.00, 55.00, 55.00, // A1
                    65.41, 65.41, 65.41, 65.41, // C2
                    48.99, 48.99, 48.99, 48.99, // G1/B1-ish
                    58.27, 58.27, 58.27, 58.27  // A#1/D2-ish
                ];
                const bassFreq = bassSequence[Math.floor(this.bgmStep / 4) % bassSequence.length];

                // Play bass notes on eighth steps
                if (step % 2 === 0) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    const filter = this.ctx.createBiquadFilter();

                    osc.type = 'sawtooth';
                    // Octave jump on step 2 of beats
                    const mult = (step % 4 === 2) ? 2.0 : 1.0;
                    osc.frequency.setValueAtTime(bassFreq * mult, now);

                    gain.gain.setValueAtTime(0.045, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.11);

                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(380, now);

                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(now);
                    osc.stop(now + 0.11);
                }

                this.bgmStep++;
            }
        }

        const audioController = new AudioController();

        // Initialize audio on first click or keypress
        const initAudioOnInteract = () => {
            audioController.init();
            window.removeEventListener('click', initAudioOnInteract);
            window.removeEventListener('keydown', initAudioOnInteract);
        };
        window.addEventListener('click', initAudioOnInteract);
        window.addEventListener('keydown', initAudioOnInteract);


        // --- GEOMETRY UTILITIES ---

        // Check segment intersection
        function getLineSegmentIntersection(a, b, c, d) {
            const den = (b.x - a.x) * (d.y - c.y) - (b.y - a.y) * (d.x - c.x);
            if (den === 0) return null;
            const t = ((c.x - a.x) * (d.y - c.y) - (c.y - a.y) * (d.x - c.x)) / den;
            const u = ((c.x - a.x) * (b.y - a.y) - (c.y - a.y) * (b.x - a.x)) / den;
            if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
                return {
                    x: a.x + t * (b.x - a.x),
                    y: a.y + t * (b.y - a.y)
                };
            }
            return null;
        }

        // Distance from point to segment
        function distToSegment(p, s1, s2) {
            const l2 = (s1.x - s2.x)**2 + (s1.y - s2.y)**2;
            if (l2 === 0) return Math.hypot(p.x - s1.x, p.y - s1.y);
            let t = ((p.x - s1.x) * (s2.x - s1.x) + (p.y - s1.y) * (s2.y - s1.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (s1.x + t * (s2.x - s1.x)), p.y - (s1.y + t * (s2.y - s1.y)));
        }

        // Polygon area using Shoelace formula
        function getPolygonArea(poly) {
            let area = 0;
            const n = poly.length;
            for (let i = 0; i < n; i++) {
                const curr = poly[i];
                const next = poly[(i + 1) % n];
                area += curr.x * next.y - next.x * curr.y;
            }
            return Math.abs(area) * 0.5;
        }

        // Centroid of a polygon
        function getPolygonCentroid(poly) {
            let cx = 0, cy = 0;
            const n = poly.length;
            for (let i = 0; i < n; i++) {
                cx += poly[i].x;
                cy += poly[i].y;
            }
            return { x: cx / n, y: cy / n };
        }

        // Split convex polygon along infinite line defined by p1 -> p2
        function splitPolygon(polygon, p1, p2) {
            const leftSide = [];
            const rightSide = [];
            const n = polygon.length;
            if (n < 3) return null;

            function getSide(p) {
                return (p.x - p1.x) * (p2.y - p1.y) - (p.y - p1.y) * (p2.x - p1.x);
            }

            let intersections = 0;
            for (let i = 0; i < n; i++) {
                const curr = polygon[i];
                const next = polygon[(i + 1) % n];

                const sideCurr = getSide(curr);
                const sideNext = getSide(next);

                if (sideCurr >= 0) {
                    leftSide.push({ x: curr.x, y: curr.y });
                }
                if (sideCurr <= 0) {
                    rightSide.push({ x: curr.x, y: curr.y });
                }

                // If edge intersects the cut line
                if ((sideCurr > 0 && sideNext < 0) || (sideCurr < 0 && sideNext > 0)) {
                    const t = sideCurr / (sideCurr - sideNext);
                    const intersect = {
                        x: curr.x + t * (next.x - curr.x),
                        y: curr.y + t * (next.y - curr.y)
                    };
                    leftSide.push({ x: intersect.x, y: intersect.y });
                    rightSide.push({ x: intersect.x, y: intersect.y });
                    intersections++;
                }
            }

            // We only successfully split if we crossed the polygon edges (at least 2 intersections/boundaries)
            if (intersections >= 1) {
                const clean = (poly) => {
                    const unique = [];
                    for (const pt of poly) {
                        let isDup = false;
                        for (const u of unique) {
                            if (Math.hypot(u.x - pt.x, u.y - pt.y) < 0.5) {
                                isDup = true;
                                break;
                            }
                        }
                        if (!isDup) unique.push(pt);
                    }
                    return unique.length >= 3 ? unique : null;
                };

                const leftPoly = clean(leftSide);
                const rightPoly = clean(rightSide);

                if (leftPoly && rightPoly) {
                    return [leftPoly, rightPoly];
                }
            }
            return null;
        }

        // Generate regular polygon vertices
        function getRegularPolygonVertices(cx, cy, radius, sides, rotation = 0) {
            const vertices = [];
            for (let i = 0; i < sides; i++) {
                const angle = rotation + (i * 2 * Math.PI) / sides;
                vertices.push({
                    x: cx + Math.cos(angle) * radius,
                    y: cy + Math.sin(angle) * radius
                });
            }
            return vertices;
        }


        // --- DYNAMIC WARPING GRID ---
        class VectorGrid {
            constructor(width, height, spacing) {
                this.width = width;
                this.height = height;
                this.spacing = spacing;
                this.points = [];
                this.warpPoints = [];
                this.init();
            }

            init() {
                this.points = [];
                for (let y = 0; y <= this.height; y += this.spacing) {
                    const row = [];
                    for (let x = 0; x <= this.width; x += this.spacing) {
                        row.push({
                            x: x,
                            y: y,
                            originalX: x,
                            originalY: y,
                            vx: 0,
                            vy: 0
                        });
                    }
                    this.points.push(row);
                }
            }

            addWarpPoint(x, y, radius, force) {
                this.warpPoints.push({ x, y, radius, force, life: 1.0 });
            }

            update(dt) {
                // Decay warp points
                for (let i = this.warpPoints.length - 1; i >= 0; i--) {
                    const wp = this.warpPoints[i];
                    wp.life -= dt * 2.2;
                    if (wp.life <= 0) {
                        this.warpPoints.splice(i, 1);
                    }
                }

                // Grid physics
                const rows = this.points.length;
                const cols = this.points[0].length;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const p = this.points[r][c];

                        // Pull back to anchor position
                        const dx = p.originalX - p.x;
                        const dy = p.originalY - p.y;

                        p.vx += dx * 0.12;
                        p.vy += dy * 0.12;

                        // Apply damping
                        p.vx *= 0.78;
                        p.vy *= 0.78;

                        // Apply warp force
                        for (const wp of this.warpPoints) {
                            const wdx = p.x - wp.x;
                            const wdy = p.y - wp.y;
                            const dist = Math.hypot(wdx, wdy);
                            if (dist < wp.radius && dist > 1.0) {
                                const factor = (1.0 - dist / wp.radius) * wp.force * wp.life;
                                p.vx += (wdx / dist) * factor;
                                p.vy += (wdy / dist) * factor;
                            }
                        }

                        p.x += p.vx;
                        p.y += p.vy;
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.strokeStyle = "rgba(0, 240, 255, 0.09)";
                ctx.lineWidth = 1;
                ctx.shadowBlur = 0; // Performance: no glow on main grid

                const rows = this.points.length;
                const cols = this.points[0].length;

                // Draw horizontal lines
                for (let r = 0; r < rows; r++) {
                    ctx.beginPath();
                    for (let c = 0; c < cols; c++) {
                        const p = this.points[r][c];
                        if (c === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                }

                // Draw vertical lines
                for (let c = 0; c < cols; c++) {
                    ctx.beginPath();
                    for (let r = 0; r < rows; r++) {
                        const p = this.points[r][c];
                        if (r === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                }
                ctx.restore();
            }
        }


        // --- UI ELEMENT BUTTON ---
        class UIButton {
            constructor(cx, cy, w, h, text, color) {
                this.cx = cx;
                this.cy = cy;
                this.baseY = cy;
                this.w = w;
                this.h = h;
                this.text = text;
                this.color = color;
                this.vertices = [];
                this.update(0);
            }

            update(time) {
                this.cy = this.baseY + Math.sin(time * 0.003) * 6;
                this.vertices = [
                    { x: this.cx - this.w/2, y: this.cy - this.h/2 },
                    { x: this.cx + this.w/2, y: this.cy - this.h/2 },
                    { x: this.cx + this.w/2, y: this.cy + this.h/2 },
                    { x: this.cx - this.w/2, y: this.cy + this.h/2 }
                ];
            }

            draw(ctx) {
                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.fillStyle = "rgba(255, 106, 0, 0.06)";
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                // Outer border
                ctx.beginPath();
                ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for (let i = 1; i < this.vertices.length; i++) {
                    ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Inner outline
                ctx.strokeStyle = "rgba(255, 106, 0, 0.45)";
                ctx.lineWidth = 1;
                ctx.strokeRect(this.cx - this.w/2 + 5, this.cy - this.h/2 + 5, this.w - 10, this.h - 10);

                // Text
                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = "#ffffff";
                ctx.shadowBlur = 5;
                ctx.font = "bold 18px 'Share Tech Mono', monospace";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.text, this.cx, this.cy);
                ctx.restore();
            }
        }


        // --- MAIN CANVAS SETUP ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Scale factor for Retina displays
        const scale = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const arenaWidth = 2000;
        let groundY = canvas.height - 100;

        // Level Platforms
        let platforms = [];
        function initPlatforms() {
            platforms = [
                { x1: 200, x2: 600, y: groundY - 120 },
                { x1: 800, x2: 1200, y: groundY - 220 },
                { x1: 1400, x2: 1800, y: groundY - 120 },
                { x1: 500, x2: 900, y: groundY - 300 },
                { x1: 1100, x2: 1500, y: groundY - 300 }
            ];
        }
        initPlatforms();

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 100;
            initPlatforms();
        });


        // --- GAME STATE VARIABLES ---
        let gameState = 'start'; // 'start', 'playing', 'gameover'
        let currentWaveIndex = 0;
        let rectifiedCount = 0;
        let score = 0;
        let comboCount = 0;
        let comboTimer = 0;
        let comboRank = 'D';

        // Camera
        let cameraX = 0;
        let cameraY = 0;
        let shakeTimer = 0;
        let shakeIntensity = 0;
        let freezeFrameTimer = 0;

        // Entity Lists
        let enemies = [];
        let projectiles = [];
        let debrisList = [];
        let particles = [];
        let damageNumbers = [];
        let healthCrystals = [];
        let spawners = [];

        // Interactive UI buttons
        let startButton = null;
        let retryButton = null;
        let menuButton = null;

        // Setup start screen button
        function resetStartButton() {
            startButton = new UIButton(1000, groundY - 150, 180, 52, "START GAME", "#ff6a00");
        }
        resetStartButton();

        // --- CONTROLS INPUT ---
        const keys = {};
        let screenMouseX = 0;
        let screenMouseY = 0;
        let mouseX = 0; // Camera adjusted
        let mouseY = 0;

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // Allow retry directly on pressing R
            if (e.code === 'KeyR' && gameState === 'gameover') {
                startGame();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            screenMouseX = e.clientX - rect.left;
            screenMouseY = e.clientY - rect.top;
        });
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) { // Left Click
                if (gameState === 'playing') {
                    player.triggerAttack();
                } else {
                    // Trigger mouse slash in start/gameover lobby
                    triggerUISlash(mouseX, mouseY);
                }
            }
        });

        // Trigger a custom mouse slash in UI states
        function triggerUISlash(mx, my) {
            // Diagonal slash coordinates centered at mouse
            const s1 = { x: mx - 60, y: my - 35 };
            const s2 = { x: mx + 60, y: my + 35 };

            spawnSlashSparks(mx, my, Math.atan2(70, 120));
            audioController.playSound('slash');
            
            // Add grid warp
            grid.addWarpPoint(mx, my, 120, 45);

            if (gameState === 'start' && startButton) {
                if (checkSlashIntersection(s1, s2, startButton.vertices)) {
                    spawnDebris(startButton.vertices, s1, s2, "#ff6a00");
                    audioController.playSound('kill');
                    startButton = null;
                    setTimeout(() => {
                        startGame();
                    }, 500);
                }
            } else if (gameState === 'gameover') {
                if (retryButton && checkSlashIntersection(s1, s2, retryButton.vertices)) {
                    spawnDebris(retryButton.vertices, s1, s2, "#ff6a00");
                    audioController.playSound('kill');
                    retryButton = null;
                    setTimeout(() => {
                        startGame();
                    }, 500);
                } else if (menuButton && checkSlashIntersection(s1, s2, menuButton.vertices)) {
                    spawnDebris(menuButton.vertices, s1, s2, "#ff6a00");
                    audioController.playSound('kill');
                    menuButton = null;
                    setTimeout(() => {
                        goToStart();
                    }, 500);
                }
            }
        }


        // --- PLAYER CHARACTER ---
        const player = {
            x: 1000,
            y: groundY,
            vx: 0,
            vy: 0,
            maxSpeed: 380,
            accel: 2500,
            friction: 7,
            jumpForce: -620,
            hp: 100,
            maxHp: 100,
            stamina: 100,
            maxStamina: 100,
            isGrounded: true,
            doubleJumpAvailable: true,
            facingDir: 1, // -1 or 1

            // Dash State
            isDashing: false,
            dashTimer: 0,
            dashDuration: 0.18,
            dashCooldown: 0,
            dashDir: 1,
            isInvulnerable: false,
            invulnFlashTimer: 0,
            dashGhosts: [],
            dashGhostTimer: 0,

            // Combat State
            isAttacking: false,
            attackTimer: 0,
            attackDuration: 0.16,
            attackComboIndex: 0,
            queuedAttack: false,
            slashAngle: 0,
            slashProgress: 0,
            comboResetTimer: 0,
            hasHitThisAttack: [],

            // Sword Coordinates
            swordStart: { x: 0, y: 0 },
            swordEnd: { x: 0, y: 0 },
            prevSwordEnd: { x: 0, y: 0 },
            swordHistory: [],

            reset() {
                this.x = 1000;
                this.y = groundY;
                this.vx = 0;
                this.vy = 0;
                this.hp = this.maxHp;
                this.stamina = this.maxStamina;
                this.isGrounded = true;
                this.doubleJumpAvailable = true;
                this.isDashing = false;
                this.dashCooldown = 0;
                this.isAttacking = false;
                this.queuedAttack = false;
                this.attackComboIndex = 0;
                this.swordHistory = [];
                this.hasHitThisAttack = [];
                this.isInvulnerable = false;
                this.invulnFlashTimer = 0;
            },

            update(dt) {
                // Invulnerability Flash
                if (this.invulnFlashTimer > 0) {
                    this.invulnFlashTimer -= dt;
                    if (this.invulnFlashTimer <= 0) {
                        this.isInvulnerable = false;
                    }
                }

                // Stamina regeneration
                if (!this.isDashing) {
                    this.stamina = Math.min(this.maxStamina, this.stamina + 35 * dt);
                }

                // Handle Dash Timers
                if (this.dashCooldown > 0) {
                    this.dashCooldown -= dt;
                }

                if (this.isDashing) {
                    this.dashTimer += dt;
                    this.isInvulnerable = true;
                    
                    // Dash physics
                    this.vx = this.dashDir * 850;
                    this.vy = 0;

                    // Dash particle trails
                    if (Math.random() < 0.45) {
                        particles.push({
                            x: this.x,
                            y: this.y - 20 + (Math.random() - 0.5) * 15,
                            vx: -this.dashDir * 100,
                            vy: (Math.random() - 0.5) * 50,
                            color: "#00f0ff",
                            life: 0.3,
                            size: 1.5,
                            type: 'line'
                        });
                    }

                    // Ghost Silhouette tracking
                    this.dashGhostTimer -= dt;
                    if (this.dashGhostTimer <= 0) {
                        this.dashGhosts.push({
                            pose: getStickFigurePose(this),
                            alpha: 0.5
                        });
                        this.dashGhostTimer = 0.04;
                    }

                    // Dash expiration
                    if (this.dashTimer >= this.dashDuration) {
                        this.isDashing = false;
                        this.vx *= 0.5; // Smooth braking
                    }

                    // Dash damage / stagger triggers
                    for (const enemy of enemies) {
                        const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        if (dist < enemy.radius + 15) {
                            if (!enemy.dashStaggered) {
                                enemy.vx += this.dashDir * 200;
                                enemy.staggerTimer = 0.6;
                                enemy.dashStaggered = true;
                                audioController.playSound('hit');
                                damageNumbers.push(new DamageNumber(enemy.x, enemy.y - 30, "STAGGER", "#00f0ff"));
                            }
                        }
                    }
                } else {
                    // Standard Horizontal Movement
                    let moveInput = 0;
                    if (keys['KeyA'] || keys['ArrowLeft']) moveInput -= 1;
                    if (keys['KeyD'] || keys['ArrowRight']) moveInput += 1;

                    if (moveInput !== 0) {
                        this.vx += moveInput * this.accel * dt;
                        // Clamp to max speed
                        if (Math.abs(this.vx) > this.maxSpeed) {
                            this.vx = Math.sign(this.vx) * this.maxSpeed;
                        }
                    } else {
                        // Apply friction
                        this.vx *= Math.exp(-this.friction * dt);
                    }

                    // Apply Gravity
                    this.vy += 1550 * dt; // Gravity acceleration
                    
                    // Update Position
                    const prevY = this.y;
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;

                    // Collision Bounds clamp
                    this.x = Math.max(15, Math.min(arenaWidth - 15, this.x));

                    // Ground & Platforms Collisions
                    this.isGrounded = false;
                    checkPlatformCollisions(this, prevY);

                    // Platform Drop through
                    if (keys['KeyS'] || keys['ArrowDown']) {
                        if (this.isGrounded && this.y < groundY) {
                            this.y += 6; // Force pass threshold
                            this.isGrounded = false;
                        }
                    }

                    // Jumping Inputs
                    if (keys['KeyW'] || keys['Space'] || keys['ArrowUp']) {
                        // Debounce key
                        keys['KeyW'] = false;
                        keys['Space'] = false;
                        keys['ArrowUp'] = false;

                        if (this.isGrounded) {
                            this.vy = this.jumpForce;
                            this.isGrounded = false;
                            audioController.playSound('jump');
                            spawnJumpRing(this.x, this.y);
                        } else if (this.doubleJumpAvailable) {
                            this.vy = this.jumpForce * 0.85;
                            this.doubleJumpAvailable = false;
                            audioController.playSound('jump');
                            spawnJumpRing(this.x, this.y);
                        }
                    }

                    // Dash Input (Shift)
                    if ((keys['ShiftLeft'] || keys['ShiftRight']) && this.dashCooldown <= 0 && this.stamina >= 30) {
                        this.isDashing = true;
                        this.dashTimer = 0;
                        this.dashCooldown = 0.8;
                        this.stamina -= 30;
                        this.dashDir = moveInput !== 0 ? Math.sign(moveInput) : this.facingDir;
                        this.dashGhosts = [];
                        this.dashGhostTimer = 0;
                        audioController.playSound('dash');
                        spawnDashExplosion(this.x, this.y, this.dashDir);
                        
                        // Warp grid
                        grid.addWarpPoint(this.x, this.y, 140, 35);

                        // Reset stagger targets
                        for (const enemy of enemies) {
                            enemy.dashStaggered = false;
                        }
                    }
                }

                // Update Dash Ghosts
                for (let i = this.dashGhosts.length - 1; i >= 0; i--) {
                    this.dashGhosts[i].alpha -= dt * 2.8;
                    if (this.dashGhosts[i].alpha <= 0) {
                        this.dashGhosts.splice(i, 1);
                    }
                }

                // Set Facing Direction based on Aim
                if (mouseX > this.x) {
                    this.facingDir = 1;
                } else {
                    this.facingDir = -1;
                }

                // Handle Attack Combos
                if (this.comboResetTimer > 0) {
                    this.comboResetTimer -= dt;
                    if (this.comboResetTimer <= 0) {
                        this.attackComboIndex = 0; // Reset back to first slash
                    }
                }

                if (this.isAttacking) {
                    this.attackTimer += dt;
                    this.slashProgress = this.attackTimer / this.attackDuration;

                    // Push slash states to trail history
                    this.swordHistory.push({
                        start: { x: this.swordStart.x, y: this.swordStart.y },
                        end: { x: this.swordEnd.x, y: this.swordEnd.y }
                    });
                    if (this.swordHistory.length > 7) {
                        this.swordHistory.shift();
                    }

                    // Perform Collision Slashes
                    this.checkSwordCollisions();

                    if (this.attackTimer >= this.attackDuration) {
                        if (this.queuedAttack) {
                            // Trigger subsequent combo link
                            this.queuedAttack = false;
                            this.isAttacking = true;
                            this.attackTimer = 0;
                            this.attackComboIndex = (this.attackComboIndex + 1) % 3;
                            this.slashAngle = Math.atan2(mouseY - (this.y - 38), mouseX - this.x);
                            this.hasHitThisAttack = [];
                            audioController.playSound('slash');
                            
                            // Warp grid
                            grid.addWarpPoint(this.x + Math.cos(this.slashAngle) * 30, this.y - 38 + Math.sin(this.slashAngle) * 30, 130, 30);
                        } else {
                            // Attack over
                            this.isAttacking = false;
                            this.comboResetTimer = 0.7;
                        }
                    }
                } else {
                    // Decay sword history trail
                    if (this.swordHistory.length > 0) {
                        this.swordHistory.shift();
                    }
                }
            },

            triggerAttack() {
                const angle = Math.atan2(mouseY - (this.y - 38), mouseX - this.x);
                if (!this.isAttacking) {
                    this.isAttacking = true;
                    this.attackTimer = 0;
                    this.slashAngle = angle;
                    this.hasHitThisAttack = [];
                    this.comboResetTimer = 0;
                    this.queuedAttack = false;
                    audioController.playSound('slash');
                    
                    // Warp grid
                    grid.addWarpPoint(this.x + Math.cos(angle) * 30, this.y - 38 + Math.sin(angle) * 30, 130, 30);
                } else if (this.attackTimer > this.attackDuration * 0.45) {
                    // Queue combo
                    this.queuedAttack = true;
                }
            },

            checkSwordCollisions() {
                const blade = { a: this.swordStart, b: this.swordEnd };
                const tipPath = { a: this.prevSwordEnd || this.swordEnd, b: this.swordEnd };

                // 1. Live Enemies check
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    if (this.hasHitThisAttack.includes(enemy.id)) continue;

                    let hit = false;
                    // Broadphase
                    const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                    if (dist < enemy.radius + 60) {
                        // Narrowphase check edge intersections
                        for (let j = 0; j < enemy.vertices.length; j++) {
                            const vCurr = enemy.vertices[j];
                            const vNext = enemy.vertices[(j + 1) % enemy.vertices.length];
                            if (getLineSegmentIntersection(blade.a, blade.b, vCurr, vNext) ||
                                getLineSegmentIntersection(tipPath.a, tipPath.b, vCurr, vNext)) {
                                hit = true;
                                break;
                            }
                        }
                    }

                    if (hit) {
                        this.hasHitThisAttack.push(enemy.id);
                        enemy.takeDamage(20 + this.attackComboIndex * 6, blade.a, blade.b);
                    }
                }

                // 2. Active Debris check
                for (let i = debrisList.length - 1; i >= 0; i--) {
                    const deb = debrisList[i];
                    
                    // Filter out tiny particles from slicing again to avoid lag
                    const area = getPolygonArea(deb.vertices);
                    if (area < 120) continue;

                    let hit = false;
                    const dDist = Math.hypot(deb.x - this.x, deb.y - this.y);
                    if (dDist < 60) {
                        // Transform relative debris vertices to absolute world space
                        const absVerts = deb.vertices.map(v => {
                            const cos = Math.cos(deb.angle);
                            const sin = Math.sin(deb.angle);
                            return {
                                x: deb.x + v.x * cos - v.y * sin,
                                y: deb.y + v.x * sin + v.y * cos
                            };
                        });

                        for (let j = 0; j < absVerts.length; j++) {
                            const vCurr = absVerts[j];
                            const vNext = absVerts[(j + 1) % absVerts.length];
                            if (getLineSegmentIntersection(blade.a, blade.b, vCurr, vNext) ||
                                getLineSegmentIntersection(tipPath.a, tipPath.b, vCurr, vNext)) {
                                hit = true;
                                break;
                            }
                        }

                        if (hit) {
                            // Slice debris piece again!
                            spawnDebris(absVerts, blade.a, blade.b, deb.color, deb.life * 0.7);
                            audioController.playSound('hit');
                            debrisList.splice(i, 1); // Remove parent
                        }
                    }
                }

                // 3. Projectiles deflection check
                for (const proj of projectiles) {
                    if (proj.faction === 'player') continue;
                    if (distToSegment(proj, blade.a, blade.b) < proj.radius + 16 ||
                        distToSegment(proj, tipPath.a, tipPath.b) < proj.radius + 16) {
                        // Deflect!
                        proj.faction = 'player';
                        // Aim towards mouse position or reverse
                        const deflectionAngle = Math.atan2(mouseY - proj.y, mouseX - proj.x);
                        proj.vx = Math.cos(deflectionAngle) * 620;
                        proj.vy = Math.sin(deflectionAngle) * 620;
                        proj.life = 4.0;
                        audioController.playSound('deflect');
                        
                        // Particles
                        spawnSlashSparks(proj.x, proj.y, deflectionAngle);
                        damageNumbers.push(new DamageNumber(proj.x, proj.y - 20, "DEFLECT", "#00f0ff"));
                    }
                }

                // 4. Start Button lobby check
                if (gameState === 'start' && startButton) {
                    if (checkSlashIntersection(blade.a, blade.b, startButton.vertices) ||
                        checkSlashIntersection(tipPath.a, tipPath.b, startButton.vertices)) {
                        spawnDebris(startButton.vertices, blade.a, blade.b, "#ff6a00");
                        audioController.playSound('kill');
                        startButton = null;
                        setTimeout(() => {
                            startGame();
                        }, 500);
                    }
                }
            }
        };

        // --- PLATFORMS COLLISION HELPERS ---
        function checkPlatformCollisions(entity, prevY) {
            // Check Ground line first
            if (entity.y >= groundY) {
                entity.y = groundY;
                entity.vy = 0;
                entity.isGrounded = true;
                if (entity.doubleJumpAvailable !== undefined) {
                    entity.doubleJumpAvailable = true;
                }
                return;
            }

            // Verify landing on floating platforms
            if (entity.vy < 0) return; // Only land when falling
            for (const plat of platforms) {
                if (entity.x >= plat.x1 && entity.x <= plat.x2) {
                    // Did entity cross platform Y from above?
                    if (prevY <= plat.y && entity.y >= plat.y) {
                        entity.y = plat.y;
                        entity.vy = 0;
                        entity.isGrounded = true;
                        if (entity.doubleJumpAvailable !== undefined) {
                            entity.doubleJumpAvailable = true;
                        }
                        return;
                    }
                }
            }
        }

        // --- STICK FIGURE RENDERING ---
        function getStickFigurePose(char) {
            const time = Date.now() * 0.005;
            const px = char.x;
            const py = char.y;

            // Core spine pivots
            const pelvis = { x: px, y: py - 20 };
            const chest = { x: px, y: py - 40 };
            const head = { x: px, y: py - 52 };

            let leftHip = { x: px - 6, y: py - 20 };
            let rightHip = { x: px + 6, y: py - 20 };
            let leftShoulder = { x: px - 8, y: py - 38 };
            let rightShoulder = { x: px + 8, y: py - 38 };

            let leftFoot = { x: px - 8, y: py };
            let rightFoot = { x: px + 8, y: py };
            let leftKnee = { x: px - 7, y: py - 10 };
            let rightKnee = { x: px + 7, y: py - 10 };

            let leftHand = { x: px - 12, y: py - 30 };
            let rightHand = { x: px + 12, y: py - 30 };
            let leftElbow = { x: px - 10, y: py - 34 };
            let rightElbow = { x: px + 10, y: py - 34 };

            if (gameState === 'gameover' && char === player) {
                // Collapsed dead pose
                pelvis.y = py - 4;
                chest.x = px + 12; chest.y = py - 6;
                head.x = px + 22; head.y = py - 6;
                leftHip = { x: px - 5, y: py - 4 };
                rightHip = { x: px + 2, y: py - 4 };
                leftShoulder = { x: px + 10, y: py - 6 };
                rightShoulder = { x: px + 14, y: py - 6 };

                leftFoot = { x: px - 16, y: py };
                rightFoot = { x: px - 10, y: py };
                leftKnee = { x: px - 10, y: py - 3 };
                rightKnee = { x: px - 4, y: py - 3 };

                leftHand = { x: px + 8, y: py };
                rightHand = { x: px + 16, y: py };
                leftElbow = { x: px + 9, y: py - 3 };
                rightElbow = { x: px + 15, y: py - 3 };
                
                char.swordStart = { x: px - 8, y: py - 2 };
                char.swordEnd = { x: px - 35, y: py - 2 };
            } else if (char.isDashing) {
                // Jetstream dash pose
                const dir = char.dashDir;
                chest.x += dir * 8;
                head.x += dir * 10;

                leftFoot = { x: px - dir * 16, y: py - 12 };
                rightFoot = { x: px - dir * 18, y: py - 8 };
                leftKnee = { x: px - dir * 8, y: py - 16 };
                rightKnee = { x: px - dir * 10, y: py - 13 };

                leftHand = { x: px - dir * 12, y: py - 36 };
                rightHand = { x: px + dir * 12, y: py - 36 };
            } else if (!char.isGrounded) {
                // Air jump pose
                leftFoot = { x: px - 8, y: py - 7 };
                rightFoot = { x: px + 5, y: py - 11 };
                leftKnee = { x: px - 10, y: py - 13 };
                rightKnee = { x: px + 7, y: py - 16 };

                leftHand = { x: px - 14, y: py - 44 };
                rightHand = { x: px + 14, y: py - 44 };
            } else if (Math.abs(char.vx) > 10) {
                // Walking / running pose cycles
                const speedMult = Math.abs(char.vx) / char.maxSpeed;
                const cycle = time * 2.8 * speedMult;
                const sin = Math.sin(cycle);
                const cos = Math.cos(cycle);

                leftFoot = { x: px + sin * 12, y: py + Math.max(0, cos) * -8 };
                rightFoot = { x: px - sin * 12, y: py + Math.max(0, -cos) * -8 };

                leftKnee = { x: (leftHip.x + leftFoot.x) / 2 - cos * 3, y: (leftHip.y + leftFoot.y) / 2 - 3 };
                rightKnee = { x: (rightHip.x + rightFoot.x) / 2 + cos * 3, y: (rightHip.y + rightFoot.y) / 2 - 3 };

                // Arm swinging
                leftHand = { x: px - 10 + cos * 8, y: py - 28 + sin * 4 };
                rightHand = { x: px + 10 - cos * 8, y: py - 28 - sin * 4 };
            } else {
                // Idle breathing cycle
                const breathe = Math.sin(time * 0.9) * 1.5;
                chest.y += breathe;
                head.y += breathe * 1.25;

                leftHand = { x: px - 10, y: py - 28 + breathe };
                rightHand = { x: px + 10, y: py - 28 + breathe };
            }

            // Weapon pose overrides if slashing
            if (char.isAttacking && !(gameState === 'gameover' && char === player)) {
                const angle = char.slashAngle;
                const progress = char.slashProgress;

                let startAngle, endAngle;
                if (char.attackComboIndex === 0) {
                    startAngle = angle - Math.PI * 0.65;
                    endAngle = angle + Math.PI * 0.45;
                } else if (char.attackComboIndex === 1) {
                    startAngle = angle + Math.PI * 0.65;
                    endAngle = angle - Math.PI * 0.45;
                } else {
                    // Spin attack!
                    startAngle = angle - Math.PI * 1.25;
                    endAngle = angle + Math.PI * 1.25;
                }

                const currentAngle = startAngle + (endAngle - startAngle) * progress;

                // Lock sword arm to attack arc position
                rightHand.x = rightShoulder.x + Math.cos(currentAngle) * 18;
                rightHand.y = rightShoulder.y + Math.sin(currentAngle) * 18;
                rightElbow.x = (rightShoulder.x + rightHand.x) / 2 + Math.sin(currentAngle) * 3;
                rightElbow.y = (rightShoulder.y + rightHand.y) / 2 - Math.cos(currentAngle) * 3;

                const swordLen = 35;
                char.swordStart = { x: rightHand.x, y: rightHand.y };
                char.swordEnd = {
                    x: rightHand.x + Math.cos(currentAngle) * swordLen,
                    y: rightHand.y + Math.sin(currentAngle) * swordLen
                };
            } else if (!(gameState === 'gameover' && char === player)) {
                // Standard resting weapon posture
                const angle = char.facingDir === 1 ? Math.PI * 0.75 : Math.PI * 0.25;
                rightHand.x = rightShoulder.x + Math.cos(angle) * 10;
                rightHand.y = rightShoulder.y + Math.sin(angle) * 10;
                rightElbow.x = (rightShoulder.x + rightHand.x) / 2;
                rightElbow.y = (rightShoulder.y + rightHand.y) / 2;

                const swordLen = 35;
                const swordAngle = char.facingDir === 1 ? -Math.PI * 0.62 : -Math.PI * 0.38;
                char.swordStart = { x: rightHand.x, y: rightHand.y };
                char.swordEnd = {
                    x: rightHand.x + Math.cos(swordAngle) * swordLen,
                    y: rightHand.y + Math.sin(swordAngle) * swordLen
                };
            }

            return {
                pelvis, chest, head,
                leftHip, rightHip, leftShoulder, rightShoulder,
                leftKnee, rightKnee, leftFoot, rightFoot,
                leftElbow, rightElbow, leftHand, rightHand
            };
        }

        function drawPlayer(ctx, char) {
            const pose = getStickFigurePose(char);

            // Draw Dash Silhouette Ghosts
            if (char.isDashing || char.dashGhosts.length > 0) {
                for (const ghost of char.dashGhosts) {
                    ctx.save();
                    ctx.strokeStyle = `rgba(0, 240, 255, ${ghost.alpha * 0.35})`;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 0;
                    drawStickFigure(ctx, ghost.pose);
                    ctx.restore();
                }
            }

            ctx.save();
            // Invincibility flicker
            if (char.invulnFlashTimer > 0 && Math.floor(Date.now() / 50) % 2 === 0) {
                ctx.restore();
                return;
            }

            // Cyan Vector styling
            const color = "#00f0ff";
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;

            drawStickFigure(ctx, pose);

            // Render glowing neon sword
            ctx.strokeStyle = "#ffffff";
            ctx.shadowColor = "#00f0ff";
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            ctx.moveTo(char.swordStart.x, char.swordStart.y);
            ctx.lineTo(char.swordEnd.x, char.swordEnd.y);
            ctx.stroke();

            // Crossguard
            ctx.strokeStyle = "#00f0ff";
            ctx.lineWidth = 2.5;
            const hAngle = Math.atan2(char.swordEnd.y - char.swordStart.y, char.swordEnd.x - char.swordStart.x) + Math.PI/2;
            ctx.beginPath();
            ctx.moveTo(char.swordStart.x - Math.cos(hAngle)*5, char.swordStart.y - Math.sin(hAngle)*5);
            ctx.lineTo(char.swordStart.x + Math.cos(hAngle)*5, char.swordStart.y + Math.sin(hAngle)*5);
            ctx.stroke();

            ctx.restore();
        }

        function drawStickFigure(ctx, pose) {
            // Head
            ctx.beginPath();
            ctx.arc(pose.head.x, pose.head.y, 6.5, 0, Math.PI * 2);
            ctx.stroke();

            // Spine
            ctx.beginPath();
            ctx.moveTo(pose.head.x, pose.head.y + 6.5);
            ctx.lineTo(pose.chest.x, pose.chest.y);
            ctx.lineTo(pose.pelvis.x, pose.pelvis.y);
            ctx.stroke();

            // Left leg
            ctx.beginPath();
            ctx.moveTo(pose.leftHip.x, pose.leftHip.y);
            ctx.lineTo(pose.leftKnee.x, pose.leftKnee.y);
            ctx.lineTo(pose.leftFoot.x, pose.leftFoot.y);
            ctx.stroke();

            // Right leg
            ctx.beginPath();
            ctx.moveTo(pose.rightHip.x, pose.rightHip.y);
            ctx.lineTo(pose.rightKnee.x, pose.rightKnee.y);
            ctx.lineTo(pose.rightFoot.x, pose.rightFoot.y);
            ctx.stroke();

            // Left arm
            ctx.beginPath();
            ctx.moveTo(pose.leftShoulder.x, pose.leftShoulder.y);
            ctx.lineTo(pose.leftElbow.x, pose.leftElbow.y);
            ctx.lineTo(pose.leftHand.x, pose.leftHand.y);
            ctx.stroke();

            // Right arm (holding sword)
            ctx.beginPath();
            ctx.moveTo(pose.rightShoulder.x, pose.rightShoulder.y);
            ctx.lineTo(pose.rightElbow.x, pose.rightElbow.y);
            ctx.lineTo(pose.rightHand.x, pose.rightHand.y);
            ctx.stroke();
        }


        // --- ENEMIES (Orange Polygons) ---
        let enemyIdCounter = 0;
        class Enemy {
            constructor(x, y, type) {
                this.id = ++enemyIdCounter;
                this.x = x;
                this.y = y;
                this.type = type; // 'stinger' (triangle), 'brute' (square), 'caster' (pentagon)
                this.vx = 0;
                this.vy = 0;
                this.rotation = 0;
                this.flashTimer = 0;
                this.staggerTimer = 0;
                this.dashStaggered = false;

                // Type configuration
                if (type === 'stinger') {
                    this.sides = 3;
                    this.radius = 21;
                    this.maxHp = 30;
                    this.state = 'idle'; // 'idle', 'charge', 'dash', 'cooldown'
                    this.stateTimer = 2.0;
                } else if (type === 'brute') {
                    this.sides = 4;
                    this.radius = 28;
                    this.maxHp = 80;
                    this.state = 'idle'; // 'idle', 'charge', 'slam', 'rest'
                    this.stateTimer = 3.0;
                } else { // 'caster'
                    this.sides = 5;
                    this.radius = 23;
                    this.maxHp = 45;
                    this.state = 'idle'; // 'idle', 'charge', 'shoot'
                    this.stateTimer = 2.5;
                    this.shootsRemaining = 0;
                    this.shootBurstTimer = 0;
                }

                this.hp = this.maxHp;
                this.localVertices = getRegularPolygonVertices(0, 0, this.radius, this.sides);
                this.vertices = [];
                this.updateVertices();
            }

            updateVertices() {
                const cos = Math.cos(this.rotation);
                const sin = Math.sin(this.rotation);
                this.vertices = this.localVertices.map(v => ({
                    x: this.x + v.x * cos - v.y * sin,
                    y: this.y + v.x * sin + v.y * cos
                }));
            }

            update(dt) {
                if (this.flashTimer > 0) this.flashTimer -= dt;
                
                // Stagger stun handling
                if (this.staggerTimer > 0) {
                    this.staggerTimer -= dt;
                    this.vx *= Math.exp(-6 * dt);
                    this.vy *= Math.exp(-6 * dt);
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.updateVertices();
                    return;
                }

                // State logic
                this.stateTimer -= dt;

                if (this.type === 'stinger') {
                    this.updateStinger(dt);
                } else if (this.type === 'brute') {
                    this.updateBrute(dt);
                } else if (this.type === 'caster') {
                    this.updateCaster(dt);
                }

                // Boundary bounds
                this.x = Math.max(this.radius, Math.min(arenaWidth - this.radius, this.x));
                
                this.updateVertices();
            }

            updateStinger(dt) {
                const playerOffset = 40;
                const tx = player.x;
                const ty = player.y - playerOffset;

                if (this.state === 'idle') {
                    // Hover and bob around player
                    const dx = tx - this.x;
                    const dy = ty - this.y;
                    const dist = Math.hypot(dx, dy);

                    this.vx += (dx / Math.max(1, dist)) * 200 * dt;
                    this.vy += (dy / Math.max(1, dist)) * 200 * dt;

                    // Apply drag
                    this.vx *= Math.exp(-2.5 * dt);
                    this.vy *= Math.exp(-2.5 * dt);

                    this.x += this.vx * dt;
                    this.y += this.vy * dt;

                    // Align rotation with velocity
                    this.rotation = Math.atan2(this.vy, this.vx);

                    if (this.stateTimer <= 0) {
                        this.state = 'charge';
                        this.stateTimer = 0.55;
                        this.vx = 0; this.vy = 0;
                        this.dashTarget = { x: player.x, y: player.y - 20 };
                    }
                } else if (this.state === 'charge') {
                    // Rotate facing player target and shake slightly
                    const angleToTarget = Math.atan2(this.dashTarget.y - this.y, this.dashTarget.x - this.x);
                    this.rotation = angleToTarget + (Math.random() - 0.5) * 0.15;

                    if (this.stateTimer <= 0) {
                        this.state = 'dash';
                        this.stateTimer = 0.45; // Dash time
                        const dx = this.dashTarget.x - this.x;
                        const dy = this.dashTarget.y - this.y;
                        const dist = Math.hypot(dx, dy) || 1;
                        this.vx = (dx / dist) * 580;
                        this.vy = (dy / dist) * 580;
                    }
                } else if (this.state === 'dash') {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    
                    // Spark trail
                    if (Math.random() < 0.35) {
                        particles.push({
                            x: this.x,
                            y: this.y,
                            vx: -this.vx * 0.2,
                            vy: -this.vy * 0.2,
                            color: "#ff6a00",
                            life: 0.25,
                            size: 1.5,
                            type: 'line'
                        });
                    }

                    // Collision check with player
                    const dist = Math.hypot(player.x - this.x, (player.y - 20) - this.y);
                    if (dist < this.radius + 15) {
                        damagePlayer(15, this.x);
                        this.state = 'cooldown';
                        this.stateTimer = 1.0;
                        this.vx = -this.vx * 0.3;
                        this.vy = -this.vy * 0.3;
                    }

                    if (this.stateTimer <= 0) {
                        this.state = 'cooldown';
                        this.stateTimer = 1.0;
                    }
                } else if (this.state === 'cooldown') {
                    this.vx *= Math.exp(-4 * dt);
                    this.vy *= Math.exp(-4 * dt);
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.rotation += dt;

                    if (this.stateTimer <= 0) {
                        this.state = 'idle';
                        this.stateTimer = 1.8 + Math.random() * 1.5;
                    }
                }
            }

            updateBrute(dt) {
                const prevY = this.y;

                if (this.state === 'idle') {
                    // Hover along ground towards player
                    const dx = player.x - this.x;
                    this.vx = Math.sign(dx) * 110;
                    this.vy += 800 * dt; // gravity

                    this.x += this.vx * dt;
                    this.y += this.vy * dt;

                    this.isGrounded = false;
                    checkPlatformCollisions(this, prevY);

                    this.rotation += Math.sign(this.vx) * dt * 1.5;

                    if (this.stateTimer <= 0) {
                        this.state = 'charge';
                        this.stateTimer = 0.9;
                        this.vx = 0; this.vy = 0;
                    }
                } else if (this.state === 'charge') {
                    // Float up slightly shaking
                    this.vy = -35;
                    this.vx = (Math.random() - 0.5) * 80; // shake
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;

                    this.rotation += dt * 5.0;

                    if (this.stateTimer <= 0) {
                        this.state = 'slam';
                        this.vy = 980; // Fast plunge
                        this.vx = 0;
                    }
                } else if (this.state === 'slam') {
                    this.vy += 2500 * dt; // massive slam acceleration
                    this.y += this.vy * dt;

                    this.isGrounded = false;
                    checkPlatformCollisions(this, prevY);

                    if (this.isGrounded) {
                        // Slam Impact!
                        this.state = 'rest';
                        this.stateTimer = 1.6;
                        this.vy = 0;

                        // Shockwave & warp grid
                        audioController.playSound('kill');
                        triggerScreenShake(18, 0.4);
                        grid.addWarpPoint(this.x, this.y, 190, -75);
                        spawnSlamRing(this.x, this.y);

                        // Damage check player
                        const pDist = Math.hypot(player.x - this.x, player.y - this.y);
                        if (pDist < 180 && player.isGrounded) {
                            damagePlayer(25, this.x);
                            // pop player
                            player.vy = -450;
                            player.vx = Math.sign(player.x - this.x) * 250;
                            player.isGrounded = false;
                        }
                    }
                } else if (this.state === 'rest') {
                    // Recover on ground
                    this.vx *= Math.exp(-8 * dt);
                    this.vy = 0;
                    this.x += this.vx * dt;

                    if (this.stateTimer <= 0) {
                        this.state = 'idle';
                        this.stateTimer = 2.8 + Math.random() * 2.0;
                    }
                }
            }

            updateCaster(dt) {
                if (this.state === 'idle') {
                    // Stay at range from player, high altitude
                    const tx = player.x + (player.x > this.x ? -310 : 310);
                    const ty = groundY - 170;

                    const dx = tx - this.x;
                    const dy = ty - this.y;
                    const dist = Math.hypot(dx, dy) || 1;

                    this.vx += (dx / dist) * 160 * dt;
                    this.vy += (dy / dist) * 160 * dt;

                    this.vx *= Math.exp(-2 * dt);
                    this.vy *= Math.exp(-2 * dt);

                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.rotation += dt * 0.7;

                    if (this.stateTimer <= 0) {
                        this.state = 'charge';
                        this.stateTimer = 0.5;
                        this.vx = 0; this.vy = 0;
                    }
                } else if (this.state === 'charge') {
                    this.rotation += dt * 3.5;
                    if (this.stateTimer <= 0) {
                        this.state = 'shoot';
                        this.shootsRemaining = 3;
                        this.shootBurstTimer = 0;
                    }
                } else if (this.state === 'shoot') {
                    this.rotation += dt * 1.5;
                    if (this.shootsRemaining > 0) {
                        this.shootBurstTimer -= dt;
                        if (this.shootBurstTimer <= 0) {
                            this.fireProjectile();
                            this.shootsRemaining--;
                            this.shootBurstTimer = 0.16;
                        }
                    } else {
                        this.state = 'idle';
                        this.stateTimer = 2.4 + Math.random() * 1.5;
                    }
                }
            }

            fireProjectile() {
                const angle = Math.atan2((player.y - 20) - this.y, player.x - this.x);
                const vx = Math.cos(angle) * 360;
                const vy = Math.sin(angle) * 360;
                projectiles.push(new Projectile(this.x, this.y, vx, vy, 'enemy'));
                audioController.playSound('jump'); // High beep
            }

            takeDamage(amount, p1, p2) {
                if (this.hp <= 0) return;
                this.hp -= amount;
                this.flashTimer = 0.12;
                
                // Knockback relative to slash
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy) || 1;
                this.vx += (dx / len) * 150;
                this.vy += (dy / len) * 150 - 50; // Pop
                this.staggerTimer = 0.15; // Short hitstop

                // Hit Stop
                freezeFrameTimer = 0.04;
                triggerScreenShake(7, 0.2);
                
                // Visual spark particles
                const avgHitPt = { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2 };
                spawnSlashSparks(avgHitPt.x, avgHitPt.y, Math.atan2(dy, dx));
                
                // Float damage number
                damageNumbers.push(new DamageNumber(this.x, this.y - this.radius, `-${amount}`, "#ff6a00"));
                audioController.playSound('hit');

                incrementCombo();

                if (this.hp <= 0) {
                    this.die(p1, p2);
                }
            }

            die(p1, p2) {
                audioController.playSound('kill');
                rectifiedCount++;
                score += this.maxHp * 10;

                // Slice the polygon
                spawnDebris(this.vertices, p1, p2, "#ff6a00");
                
                // Explode shards
                spawnEnemyExplosion(this.x, this.y);

                // Grid shockwave
                grid.addWarpPoint(this.x, this.y, 160, 50);

                // Health drop
                const count = Math.random() < 0.4 ? 2 : 1;
                for (let i = 0; i < count; i++) {
                    healthCrystals.push(new HealthCrystal(this.x, this.y));
                }

                // Remove from active list
                const index = enemies.indexOf(this);
                if (index > -1) {
                    enemies.splice(index, 1);
                }
            }
        }


        // --- PROJECTILE ---
        class Projectile {
            constructor(x, y, vx, vy, faction) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.faction = faction; // 'enemy' or 'player'
                this.radius = 6;
                this.active = true;
                this.life = 4.5;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.life -= dt;
                if (this.life <= 0) this.active = false;

                // Collide with boundary walls
                if (this.x < 0 || this.x > arenaWidth) this.active = false;

                // Collide with target faction
                if (this.faction === 'enemy') {
                    const dist = Math.hypot(player.x - this.x, (player.y - 20) - this.y);
                    if (dist < this.radius + 15) {
                        this.active = false;
                        damagePlayer(10, this.x);
                    }
                } else { // faction === 'player'
                    for (const enemy of enemies) {
                        const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        if (dist < enemy.radius + this.radius) {
                            this.active = false;
                            const p1 = { x: this.x - this.vx * 0.05, y: this.y - this.vy * 0.05 };
                            const p2 = { x: this.x, y: this.y };
                            enemy.takeDamage(35, p1, p2);
                            break;
                        }
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                const color = this.faction === 'player' ? "#00f0ff" : "#ff6a00";
                ctx.strokeStyle = color;
                ctx.fillStyle = this.faction === 'player' ? "rgba(0, 240, 255, 0.15)" : "rgba(255, 106, 0, 0.15)";
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;

                ctx.translate(this.x, this.y);
                ctx.rotate(Math.atan2(this.vy, this.vx));

                // Vector triangle bullet shape
                ctx.beginPath();
                ctx.moveTo(this.radius * 1.6, 0);
                ctx.lineTo(-this.radius, -this.radius);
                ctx.lineTo(-this.radius, this.radius);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            }
        }


        // --- SLICED POLYGON DEBRIS (Physics Ragdolls) ---
        class Debris {
            constructor(x, y, vertices, vx, vy, vAngle, color, life) {
                this.x = x;
                this.y = y;
                this.vertices = vertices; // Relative coordinates
                this.vx = vx;
                this.vy = vy;
                this.angle = 0;
                this.vAngle = vAngle;
                this.color = color;
                this.maxLife = life;
                this.life = life;
            }

            update(dt) {
                this.life -= dt;
                this.vy += 1400 * dt; // gravity

                const prevY = this.y;
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.angle += this.vAngle * dt;

                // Clamp to arena edges
                if (this.x < 0 || this.x > arenaWidth) {
                    this.vx = -this.vx * 0.4;
                    this.x = Math.max(0, Math.min(arenaWidth, this.x));
                }

                // Bounce on floors & platforms
                let bottomY = -99999;
                const cos = Math.cos(this.angle);
                const sin = Math.sin(this.angle);
                
                // Get the absolute bottom-most point of the polygon to check landing
                for (const v of this.vertices) {
                    const absY = this.y + v.x * sin + v.y * cos;
                    if (absY > bottomY) bottomY = absY;
                }

                const penetration = bottomY - this.y; // distance from center to bottom vertex

                // Collision checks
                let hitFloor = false;
                if (bottomY >= groundY) {
                    this.y = groundY - penetration;
                    hitFloor = true;
                } else {
                    for (const plat of platforms) {
                        if (this.x >= plat.x1 && this.x <= plat.x2) {
                            const prevBottomY = prevY + penetration;
                            if (prevBottomY <= plat.y && bottomY >= plat.y) {
                                this.y = plat.y - penetration;
                                hitFloor = true;
                                break;
                            }
                        }
                    }
                }

                if (hitFloor) {
                    this.vy = -this.vy * 0.42; // bounce
                    this.vx *= 0.65; // slide drag
                    this.vAngle *= 0.65; // rotation damping
                    
                    if (Math.abs(this.vy) > 30 && Math.random() < 0.35) {
                        spawnSparks(this.x, bottomY, this.color);
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                const progress = this.life / this.maxLife;
                ctx.strokeStyle = this.color;
                ctx.fillStyle = "rgba(255, 106, 0, 0.05)";
                ctx.lineWidth = 2;
                ctx.globalAlpha = Math.max(0, progress);
                ctx.shadowBlur = 10 * progress;
                ctx.shadowColor = this.color;

                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.beginPath();
                ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for (let i = 1; i < this.vertices.length; i++) {
                    ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            }
        }

        // Spawn debris parts on split
        function spawnDebris(vertices, p1, p2, color, life = 1.4) {
            // Convert slash points to a massive line across the screen to ensure complete split
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const len = Math.hypot(dx, dy) || 1;
            const ux = dx / len;
            const uy = dy / len;

            const infiniteLine1 = { x: p1.x - ux * 2000, y: p1.y - uy * 2000 };
            const infiniteLine2 = { x: p2.x + ux * 2000, y: p2.y + uy * 2000 };

            const split = splitPolygon(vertices, infiniteLine1, infiniteLine2);
            if (split) {
                const [poly1, poly2] = split;
                
                // Normal direction to cut for push velocity
                const nx = -uy;
                const ny = ux;

                createDebrisPiece(poly1, nx * 200, ny * 200, color, life);
                createDebrisPiece(poly2, -nx * 200, -ny * 200, color, life);
            }
        }
