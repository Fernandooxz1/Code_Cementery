        function createDebrisPiece(poly, pushX, pushY, color, life) {
            const centroid = getPolygonCentroid(poly);
            const relVerts = poly.map(p => ({
                x: p.x - centroid.x,
                y: p.y - centroid.y
            }));

            debrisList.push(new Debris(
                centroid.x,
                centroid.y,
                relVerts,
                pushX + (Math.random() - 0.5) * 60,
                pushY - 120 - Math.random() * 80, // popup pop
                (Math.random() - 0.5) * 10, // spin
                color,
                life
            ));
        }

        // Check if slash crosses a polygon
        function checkSlashIntersection(p1, p2, vertices) {
            const n = vertices.length;
            for (let i = 0; i < n; i++) {
                const vCurr = vertices[i];
                const vNext = vertices[(i + 1) % n];
                if (getLineSegmentIntersection(p1, p2, vCurr, vNext)) {
                    return true;
                }
            }
            return false;
        }


        // --- SPAWNER RING PORTAL ---
        class Spawner {
            constructor(x, y, type, delay) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.timer = delay;
                this.maxTimer = delay;
                this.radius = 42;
                this.active = true;
                this.rotation = 0;
            }

            update(dt) {
                this.timer -= dt;
                this.rotation += dt * 3.5;

                if (this.timer <= 0) {
                    this.active = false;
                    spawnEnemy(this.x, this.y, this.type);
                }
            }

            draw(ctx) {
                ctx.save();
                const progress = this.timer / this.maxTimer; // 1 to 0
                const scale = 1.0 - progress;

                ctx.strokeStyle = "#ff6a00";
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff6a00";

                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Draw shrinking wireframe rings
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * scale, 0, Math.PI * 2);
                ctx.stroke();

                // Draw ticks pointing in
                ctx.strokeStyle = "rgba(255, 106, 0, 0.4)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                const ticksCount = 6;
                for (let i = 0; i < ticksCount; i++) {
                    const angle = (i * 2 * Math.PI) / ticksCount;
                    ctx.moveTo(Math.cos(angle) * this.radius * scale, Math.sin(angle) * this.radius * scale);
                    ctx.lineTo(Math.cos(angle) * this.radius * scale * 0.4, Math.sin(angle) * this.radius * scale * 0.4);
                }
                ctx.stroke();

                ctx.restore();
            }
        }


        // --- HEALING ENERGY CRYSTALS ---
        class HealthCrystal {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 180;
                this.vy = -160 - Math.random() * 80;
                this.radius = 6;
                this.active = true;
            }

            update(dt) {
                // Check distance to player for magnetic pull
                const dx = player.x - this.x;
                const dy = (player.y - 20) - this.y;
                const dist = Math.hypot(dx, dy);

                if (dist < 160) {
                    const force = 480;
                    this.vx += (dx / dist) * force * dt;
                    this.vy += (dy / dist) * force * dt;

                    // Cap magnet speed
                    const speed = Math.hypot(this.vx, this.vy);
                    if (speed > 450) {
                        this.vx = (this.vx / speed) * 450;
                        this.vy = (this.vy / speed) * 450;
                    }
                } else {
                    this.vy += 420 * dt; // gravity
                    this.vx *= Math.exp(-2 * dt); // air drag
                }

                this.x += this.vx * dt;
                this.y += this.vy * dt;

                // Bounce on floors & platforms
                if (this.y >= groundY) {
                    this.y = groundY;
                    this.vy = -this.vy * 0.4;
                    this.vx *= 0.6;
                }

                // Picked up
                if (dist < 15 && this.active) {
                    this.active = false;
                    player.hp = Math.min(player.maxHp, player.hp + 8);
                    audioController.playSound('deflect');
                    
                    // Sparks and indicator text
                    spawnHealParticles(this.x, this.y);
                    damageNumbers.push(new DamageNumber(player.x, player.y - 45, "+8 HP", "#00ff66"));
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.strokeStyle = "#00ff66";
                ctx.fillStyle = "rgba(0, 255, 102, 0.15)";
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00ff66";

                ctx.translate(this.x, this.y);
                ctx.rotate(Date.now() * 0.005);

                // Small Diamond
                ctx.beginPath();
                ctx.moveTo(0, -this.radius);
                ctx.lineTo(this.radius * 0.7, 0);
                ctx.lineTo(0, this.radius);
                ctx.lineTo(-this.radius * 0.7, 0);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            }
        }


        // --- DAMAGE NUMBERS DISPLAY ---
        class DamageNumber {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 80;
                this.vy = -120 - Math.random() * 60;
                this.text = text;
                this.color = color;
                this.life = 0.95;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy += 220 * dt; // slight falling drift
                this.life -= dt * 1.35;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 8;
                ctx.font = "bold 17px 'Share Tech Mono', monospace";

        }

        function spawnSlamRing(x, y) {

        function spawnSparks(x, y, color) {
            for (let i = 0; i < 4; i++) {
                particles.push({
                    x: x,

                    vy: -50 - Math.random() * 70,
                    color: color,
                    life: 0.3,

                    type: 'spark'
                });
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= dt;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                if (p.type === 'spark') {
                    p.vy += 450 * dt; // gravity
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                } else if (p.type === 'line') {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                }
            }
        }

        function drawParticles(ctx) {
            for (const p of particles) {
                ctx.save();
                ctx.strokeStyle = p.color;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 0.6; // Scale opacity by life span remaining
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;

                if (p.type === 'spark') {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'line') {
                    ctx.lineWidth = p.size;
                    const speed = Math.hypot(p.vx, p.vy) || 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - (p.vx / speed) * p.size * 6, p.y - (p.vy / speed) * p.size * 6);
                    ctx.stroke();
                } else if (p.type === 'ring') {
                    ctx.lineWidth = 2;
                    const radius = p.size + (p.maxSize - p.size) * (1.0 - p.life / 0.45);
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }


        // --- WAVE SPAWNING PROTOCOL ---
        const WAVES = [
            { name: "LINEAR COHERENCY", spawns: [{ type: 'stinger', x: 400, delay: 1.0 }, { type: 'stinger', x: 1600, delay: 2.2 }, { type: 'stinger', x: 1000, delay: 3.5 }] },
            { name: "THE TRIANGLE RAID", spawns: [{ type: 'stinger', x: 300, delay: 0.8 }, { type: 'stinger', x: 700, delay: 1.5 }, { type: 'stinger', x: 1300, delay: 2.5 }, { type: 'brute', x: 1700, delay: 3.8 }] },
            { name: "CURVED INTRUSION", spawns: [{ type: 'caster', x: 500, delay: 1.0 }, { type: 'stinger', x: 900, delay: 2.0 }, { type: 'caster', x: 1500, delay: 3.2 }, { type: 'brute', x: 1000, delay: 5.0 }] },
            { name: "DISTORTION CRITICAL", spawns: [{ type: 'brute', x: 400, delay: 0.8 }, { type: 'brute', x: 1600, delay: 1.8 }, { type: 'caster', x: 800, delay: 3.0 }, { type: 'caster', x: 1200, delay: 3.0 }] },
            { name: "THE POLYGON COUNCIL", spawns: [
                { type: 'stinger', x: 300, delay: 0.5 }, { type: 'stinger', x: 1700, delay: 1.2 },
                { type: 'brute', x: 600, delay: 2.5 }, { type: 'brute', x: 1400, delay: 3.5 },
                { type: 'caster', x: 1000, delay: 5.0 }, { type: 'caster', x: 800, delay: 6.0 }
            ]}
        ];

        let waveDisplayTimer = 0;
        let waveDisplayName = "";

        function startWave(index) {
            currentWaveIndex = index;
            let currentWave;
            if (index < WAVES.length) {
                currentWave = WAVES[index];
                waveDisplayName = `WAVE ${index + 1}: ${currentWave.name}`;
            } else {
                // Endless generation after Wave 5
                waveDisplayName = `ENDLESS COMPILING: WAVE ${index + 1}`;
                currentWave = generateEndlessWave(index);
            }

            waveDisplayTimer = 3.5; // Seconds banner displays
            spawners = [];
            
            for (const sp of currentWave.spawns) {
                // Spawner Y is floated above ground/platform coordinates
                const spawnY = groundY - 140 - Math.random() * 80;
                spawners.push(new Spawner(sp.x, spawnY, sp.type, sp.delay));
            }
        }

        function generateEndlessWave(waveIdx) {
            const spawns = [];
            const count = 3 + Math.floor(waveIdx * 0.8);
            const types = ['stinger', 'brute', 'caster'];
            
            for (let i = 0; i < count; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const x = 200 + Math.random() * 1600;
                const delay = 0.5 + i * 1.1;
                spawns.push({ type, x, delay });
            }
            return { spawns };
        }

        function spawnEnemy(x, y, type) {
            enemies.push(new Enemy(x, y, type));
            grid.addWarpPoint(x, y, 130, -45); // small inward pull on spawn
        }


        // --- PLAYER DAMAGE & COMBO MANAGEMENT ---
        function damagePlayer(amount, sourceX) {
            if (player.isInvulnerable || gameState !== 'playing') return;

            player.hp = Math.max(0, player.hp - amount);
            player.isInvulnerable = true;
            player.invulnFlashTimer = 1.0;
            
            // Knockback
            player.vx = Math.sign(player.x - sourceX) * 350;
            player.vy = -350;
            player.isGrounded = false;

            // Hit stop & screenshake
            freezeFrameTimer = 0.05;
            triggerScreenShake(20, 0.45);
            audioController.playSound('hurt');

            // Float damage indicators
            damageNumbers.push(new DamageNumber(player.x, player.y - 50, `-${amount} HP`, "#ff0055"));

            // Clear combo
            comboCount = 0;
            comboRank = 'D';

            if (player.hp <= 0) {
                triggerGameOver();
            }
        }

        function incrementCombo() {
            comboCount++;
            comboTimer = 3.5; // Keep combo alive for 3.5s

            // Scale combo Rank lettering
            if (comboCount >= 28) comboRank = 'SSS';
            else if (comboCount >= 19) comboRank = 'SS';
            else if (comboCount >= 13) comboRank = 'S';
            else if (comboCount >= 9) comboRank = 'A';
            else if (comboCount >= 6) comboRank = 'B';
            else if (comboCount >= 3) comboRank = 'C';
            else comboRank = 'D';
        }

        function updateCombo(dt) {
            if (comboCount > 0) {
                comboTimer -= dt;
                if (comboTimer <= 0) {
                    comboCount = 0;
                    comboRank = 'D';
                }
            }
        }

        function triggerScreenShake(intensity, duration) {
            shakeIntensity = intensity;
            shakeTimer = duration;
        }

        function triggerGameOver() {
            setTimeout(() => {
                gameState = 'gameover';
                
                // Spawn interactive menu buttons relative to camera viewpoint
                const cx = cameraX + canvas.width / 2;
                retryButton = new UIButton(cx, groundY - 130, 160, 48, "RETRY", "#ff6a00");
                menuButton = new UIButton(cx, groundY - 70, 160, 48, "MAIN MENU", "#ff6a00");
            }, 800); // Small dramatic delay
        }

        function startGame() {
            rectifiedCount = 0;
            score = 0;
            comboCount = 0;
            comboRank = 'D';
            
            player.reset();
            enemies = [];
            projectiles = [];
            debrisList = [];
            particles = [];
            damageNumbers = [];
            healthCrystals = [];
            spawners = [];
            
            startButton = null;
            retryButton = null;
            menuButton = null;
            
            gameState = 'playing';

        }

        function goToStart() {
            gameState = 'start';
            player.reset();
            resetStartButton();
            enemies = [];
            projectiles = [];
            debrisList = [];
            particles = [];
            damageNumbers = [];

        }


        // --- RENDERING PIPELINE ---

        // Grid & Platform declarations
        const grid = new VectorGrid(2000, 1200, 50);
        let lastTime = performance.now();

        // Game Loop
        function loop(time) {
            const dt = Math.min(0.08, (time - lastTime) / 1000);
            lastTime = time;

            // 1. Check Freeze Frame (Hit stop impact)
            if (freezeFrameTimer > 0) {
                freezeFrameTimer -= dt;
                requestAnimationFrame(loop);
                return;
            }

            // 2. State Physics Updates
            grid.update(dt);
            updateParticles(dt);

            // Update interactive buttons
            if (gameState === 'start' && startButton) {
                startButton.update(time);
            }
            if (gameState === 'gameover') {
                if (retryButton) retryButton.update(time);
                if (menuButton) menuButton.update(time);
            }

            if (gameState === 'start') {
                // Lobby physics sandbox for player
                player.update(dt);
                
                // Check platforms sandbox collisions
                const prevY = player.y;
                player.isGrounded = false;
                checkPlatformCollisions(player, prevY);
                
                // Limit sandbox borders
                player.x = Math.max(10, Math.min(arenaWidth - 10, player.x));

                // Update debris inside lobby
                for (let i = debrisList.length - 1; i >= 0; i--) {
                    debrisList[i].update(dt);
                    if (debrisList[i].life <= 0) debrisList.splice(i, 1);
                }
            } else if (gameState === 'playing') {
                player.update(dt);
                updateCombo(dt);

                // Update Wave manager status
                if (waveDisplayTimer > 0) {
                    waveDisplayTimer -= dt;
                }

                // Check waves transition completion
                if (enemies.length === 0 && spawners.length === 0 && gameState === 'playing') {
                    // Start next Wave
                    startWave(currentWaveIndex + 1);
                }

                // Update Spawner portals
                for (let i = spawners.length - 1; i >= 0; i--) {
                    spawners[i].update(dt);
                    if (!spawners[i].active) spawners.splice(i, 1);
                }

                // Update live Enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    enemies[i].update(dt);
                }

                // Update Projectiles
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    projectiles[i].update(dt);
                    if (!projectiles[i].active) projectiles.splice(i, 1);
                }

                // Update debris physical ragdolls
                for (let i = debrisList.length - 1; i >= 0; i--) {
                    debrisList[i].update(dt);
                    if (debrisList[i].life <= 0) debrisList.splice(i, 1);
                }

                // Update Floating damage indices
                for (let i = damageNumbers.length - 1; i >= 0; i--) {
                    damageNumbers[i].update(dt);
                    if (damageNumbers[i].life <= 0) damageNumbers.splice(i, 1);
                }

                // Update energy cores (Health crystals)
                for (let i = healthCrystals.length - 1; i >= 0; i--) {
                    healthCrystals[i].update(dt);
                    if (!healthCrystals[i].active) healthCrystals.splice(i, 1);
                }
            } else if (gameState === 'gameover') {
                // Empty physics update when dead except grid & debris
                for (let i = debrisList.length - 1; i >= 0; i--) {
                    debrisList[i].update(dt);
                    if (debrisList[i].life <= 0) debrisList.splice(i, 1);
                }
            }

            // 3. Camera Scrolling & Screen Shake interpolations
            let targetCamX = Math.max(0, Math.min(arenaWidth - canvas.width, player.x - canvas.width / 2));
            cameraX += (targetCamX - cameraX) * 0.09;

            let shakeOffsetX = 0;
            let shakeOffsetY = 0;
            if (shakeTimer > 0) {
                shakeTimer -= dt;
                shakeOffsetX = (Math.random() - 0.5) * shakeIntensity;
                shakeOffsetY = (Math.random() - 0.5) * shakeIntensity;
            }

            // Sync world mouse cursor
            mouseX = screenMouseX + cameraX;
            mouseY = screenMouseY;

            // 4. DRAWING PASS
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // World transform block (Affected by Camera)
            ctx.save();
            ctx.translate(-cameraX + shakeOffsetX, shakeOffsetY);

            // Draw elastic vector grid
            grid.draw(ctx);

            // Draw level platforms
            drawPlatforms(ctx);

            // Draw dynamic active items
            for (const sp of spawners) sp.draw(ctx);
            for (const deb of debrisList) deb.draw(ctx);
            for (const cry of healthCrystals) cry.draw(ctx);
            for (const proj of projectiles) proj.draw(ctx);
            
            // Draw visual sword trail
            drawSlashTrail(ctx);

            // Draw player character
            drawPlayer(ctx, player);

            // Draw live enemies
            for (const en of enemies) drawEnemy(ctx, en);

            // Particles & Float damage text
            drawParticles(ctx);
            for (const num of damageNumbers) num.draw(ctx);

            ctx.restore(); // Exit camera coordinates

            // Screen-Space drawing pass (HUD & UI overlays)
            drawHUD(ctx);

            requestAnimationFrame(loop);
        }

                }
                if (menuButton) {
                    ctx.save();
                    ctx.translate(-cameraX, 0);
                    menuButton.draw(ctx);
                    ctx.restore();
                }
            }
        }

        // Draw visual sword trail
        function drawSlashTrail(ctx) {
            if (player.swordHistory.length > 1) {
                ctx.save();
                
                // Opacity & thickness properties
                ctx.strokeStyle = "rgba(0, 240, 255, 0.4)";
                ctx.lineWidth = 3.5;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#00f0ff";

                // Draw outer arc line
                ctx.beginPath();
                ctx.moveTo(player.swordHistory[0].end.x, player.swordHistory[0].end.y);
                for (let i = 1; i < player.swordHistory.length; i++) {
                    ctx.lineTo(player.swordHistory[i].end.x, player.swordHistory[i].end.y);
                }
                ctx.stroke();

                // Draw solid blade trail polygon
                ctx.fillStyle = "rgba(0, 240, 255, 0.08)";
                ctx.beginPath();
                ctx.moveTo(player.swordHistory[0].start.x, player.swordHistory[0].start.y);
                for (let i = 1; i < player.swordHistory.length; i++) {
                    ctx.lineTo(player.swordHistory[i].start.x, player.swordHistory[i].start.y);
                }
                for (let i = player.swordHistory.length - 1; i >= 0; i--) {
                    ctx.lineTo(player.swordHistory[i].end.x, player.swordHistory[i].end.y);
                }
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        // Draw level platforms & perspective ticks
        function drawPlatforms(ctx) {
            ctx.save();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2.2;
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ffffff";

            for (const plat of platforms) {
                ctx.beginPath();
                ctx.moveTo(plat.x1, plat.y);
                ctx.lineTo(plat.x2, plat.y);
                ctx.stroke();

                // Draw end caps blueprint lines
                ctx.strokeStyle = "rgba(0, 240, 255, 0.6)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(plat.x1, plat.y - 7);
                ctx.lineTo(plat.x1, plat.y + 7);
                ctx.moveTo(plat.x2, plat.y - 7);
                ctx.lineTo(plat.x2, plat.y + 7);
                ctx.stroke();
            }

            // Draw Ground Floor
            ctx.strokeStyle = "#00f0ff";
            ctx.lineWidth = 3.5;
            ctx.shadowColor = "#00f0ff";
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(arenaWidth, groundY);
            ctx.stroke();

            // Draw Perspective lines for grid floor
            ctx.strokeStyle = "rgba(0, 240, 255, 0.14)";
            ctx.shadowBlur = 0;
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x <= arenaWidth; x += 40) {
                ctx.moveTo(x, groundY);
                ctx.lineTo(x - 30, canvas.height);
            }
            ctx.stroke();

            ctx.restore();
        }

        // Draw Single Enemy
        function drawEnemy(ctx, en) {
            ctx.save();

            let color = "#ff6a00";
            let blur = 14;

            if (en.flashTimer > 0) {
                color = "#ffffff";
                blur = 30;
            } else if (en.state === 'charge') {
                // Rapid blink red
                const blink = Math.sin(Date.now() * 0.05) * 0.5 + 0.5;
                color = blink > 0.5 ? "#ff0044" : "#ff6a00";
                blur = 24;
            }

            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.shadowBlur = blur;
            ctx.shadowColor = color;

            // Main outline polygon
            ctx.beginPath();
            ctx.moveTo(en.vertices[0].x, en.vertices[0].y);
            for (let i = 1; i < en.vertices.length; i++) {
                ctx.lineTo(en.vertices[i].x, en.vertices[i].y);
            }
            ctx.closePath();
            ctx.stroke();

            // Nested core scaling shape
            ctx.save();
            ctx.globalAlpha = 0.45;
            ctx.lineWidth = 1.2;
            ctx.translate(en.x, en.y);
            
            const scalePulse = 0.4 + Math.sin(Date.now() * 0.01) * 0.08;
            ctx.scale(scalePulse, scalePulse);
            ctx.rotate(en.rotation * -1.8);

            ctx.beginPath();
            const relVerts = en.vertices.map(v => ({ x: v.x - en.x, y: v.y - en.y }));
            ctx.moveTo(relVerts[0].x, relVerts[0].y);
            for (let i = 1; i < relVerts.length; i++) {
                ctx.lineTo(relVerts[i].x, relVerts[i].y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();

            // Decorative jetstream / floating indicators
            ctx.lineWidth = 1;
            ctx.strokeStyle = "rgba(255, 106, 0, 0.4)";
            if (en.type === 'stinger') {
                // Draw 2 thruster trail lines backwards
                const angle = en.rotation;
                ctx.beginPath();
                ctx.moveTo(en.x - Math.cos(angle)*15, en.y - Math.sin(angle)*15);
                ctx.lineTo(en.x - Math.cos(angle)*30, en.y - Math.sin(angle)*30);
                ctx.stroke();
            } else if (en.type === 'brute') {
                // Bottom leg lines
                ctx.beginPath();
                ctx.moveTo(en.x - 12, en.y + 20);
                ctx.lineTo(en.x - 12, en.y + 32 + Math.sin(Date.now()*0.02)*6);
                ctx.moveTo(en.x + 12, en.y + 20);
                ctx.lineTo(en.x + 12, en.y + 32 + Math.cos(Date.now()*0.02)*6);
                ctx.stroke();
            } else if (en.type === 'caster') {
                // Inner rotating ring
                ctx.beginPath();
                ctx.arc(en.x, en.y, en.radius + 8, 0, Math.PI * 2);
                ctx.stroke();

                // Draw rotating ticks on ring
                ctx.strokeStyle = color;
                ctx.beginPath();
                const tickAngle = Date.now() * 0.0012;
                for (let i = 0; i < 5; i++) {
                    const a = tickAngle + (i * 2 * Math.PI) / 5;
                    ctx.moveTo(en.x + Math.cos(a) * (en.radius + 6), en.y + Math.sin(a) * (en.radius + 6));
                    ctx.lineTo(en.x + Math.cos(a) * (en.radius + 11), en.y + Math.sin(a) * (en.radius + 11));
                }
                ctx.stroke();
            }

            // Draw Health Bar
            if (en.hp < en.maxHp) {
                const width = en.radius * 2;
                const height = 4.5;
                const hx = en.x - width / 2;
                const hy = en.y - en.radius - 12;

                ctx.fillStyle = "rgba(255, 106, 0, 0.2)";
                ctx.fillRect(hx, hy, width, height);
                ctx.fillStyle = color;
                ctx.fillRect(hx, hy, width * (en.hp / en.maxHp), height);
            }

            ctx.restore();
        }

        // Draw Helper texts
        function drawText(ctx, text, x, y, size, color, align = "center", blur = 5) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = blur;
            ctx.font = `bold ${size}px 'Share Tech Mono', monospace`;
            ctx.textAlign = align;
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        // Draw wrapped lines paragraphs
        function drawParagraph(ctx, lines, x, y, lineH, size, color, align = "center") {
            ctx.save();
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 0;
            ctx.font = `${size}px 'Share Tech Mono', monospace`;
            ctx.textAlign = align;
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], x, y + i * lineH);
            }
            ctx.restore();
        }

        // Run Loop
        requestAnimationFrame(loop);

    </script>
</body>
